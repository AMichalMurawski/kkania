[build]
  command = "npm run build"
  publish = "dist"

# 🔄 Obsługa SPA – wszystkie ścieżki do index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 📦 Cache dla statycznych plików (JS, CSS, obrazy)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 🧹 Cache dla favicon i ikon
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ⚡ Service Worker zawsze pobierany na świeżo
[[headers]]
  for = "/registerSW.js"
  [headers.values]
    Cache-Control = "no-cache"

# 📱 Manifest też pobierany na świeżo
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"
